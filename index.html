    <!-- Styles for fallback page -->
    <style>
        html,
        body {
            background-color: #0a0a0a;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }

        .noscript-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            text-align: center;
            padding: 20px;
            z-index: 2;
            position: relative;
        }

        .noscript-container h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #fff;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .noscript-container p {
            margin-bottom: 2rem;
            color: #888;
        }

        .noscript-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }

        .noscript-links a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .noscript-links a:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>

    <!-- Redirect logic -->
    <script>
        (function () {
            const SUPPORTED_LANGS = ['tr', 'en', 'de', 'fr', 'es', 'it', 'pt', 'nl', 'id', 'ru', 'ja', 'ko', 'zh', 'hi', 'ar', 'az'];
            const DEFAULT_LANG = 'en';
            const STORAGE_KEY = 'vtx_lang';

            function getBasePath() {
                const path = window.location.pathname;
                if (path.includes('/eventsite/')) return '/eventsite';
                if (window.location.protocol === 'file:') {
                    return path.substring(0, path.lastIndexOf('/')).replace(/\/index\.html$/, '');
                }
                return '';
            }

            try {
                const savedLang = localStorage.getItem(STORAGE_KEY);
                const userLang = navigator.language || navigator.userLanguage;
                const shortLang = userLang ? userLang.substring(0, 2) : 'en';

                let targetLang = DEFAULT_LANG;

                if (savedLang && SUPPORTED_LANGS.includes(savedLang)) {
                    targetLang = savedLang;
                } else if (SUPPORTED_LANGS.includes(shortLang)) {
                    targetLang = shortLang;
                }

                localStorage.setItem(STORAGE_KEY, targetLang);

                const basePath = getBasePath();
                const targetUrl = `${window.location.origin}${basePath}/${targetLang}/`;

                window.location.replace(targetUrl);
            } catch (e) {
                console.error("Redirect logic failed", e);
                window.location.replace('./en/');
            }
        })();
    </script>
</head>
